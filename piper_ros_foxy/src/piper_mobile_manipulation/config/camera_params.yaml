/**:
  ros__parameters:
    detection_topic: "/piper/sam2_detection_2d"
    depth_topic: "/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/color/camera_info"
    mask_topic: "/piper/sam2_target_mask"
    target_topic: "/piper/target_3d"
    depth_min_m: 0.25
    depth_max_m: 1.20
    min_depth_m: 0.25
    max_depth_m: 1.20
    use_median_depth: true
    min_valid_depth_ratio: 0.0
    min_valid_depth_pixels: 20
    crop_half_size_px: 10
    roi_half_size_px: 10
    use_detection_bbox: false
    bbox_scale: 0.6
    depth_percentile: 50.0
    max_depth_stddev_m: 0.20
    confidence_depth_stddev_m: 0.15
    max_depth_jump_m: 0.20
    # Keep this output raw; target_tracker_node owns temporal filtering.
    smoothing_alpha: 1.0
    use_mask_depth: true
    mask_max_age_s: 0.20
    mask_erode_px: 2
    debug: true
    sync_queue_size: 10
    sync_slop_sec: 0.08
