/**:
  ros__parameters:
    # Presets: green, red, blue, yellow, orange, purple, custom.
    target_color: "green"
    # Keep false while tuning: target_color is the label, hsv_lower/hsv_upper
    # are the active detector bounds.
    use_color_preset: false
    hsv_lower: [35, 80, 60]
    hsv_upper: [88, 255, 255]
    min_contour_area: 400.0
    max_contour_area: 100000.0
    morph_kernel_size: 3
    morph_open_kernel_size: 3
    morph_close_kernel_size: 7
    min_extent: 0.25
    min_circularity: 0.0
    min_detection_confidence: 0.1
    prefer_centered: true
    area_confidence_full_scale: 5.0
    log_valid_every_n: 30
    image_topic: "/camera/color/image_raw"
    detection_topic: "/piper/detection_2d"
    debug_image_topic: "/piper/detection_debug_image"
    mask_topic: "/piper/detection_mask"
