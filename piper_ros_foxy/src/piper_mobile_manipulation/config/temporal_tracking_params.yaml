/**:
  ros__parameters:
    color_image_topic: "/camera/color/image_raw"
    depth_image_topic: "/camera/aligned_depth_to_color/image_raw"
    seed_mask_topic: "/piper/heavy_target_mask"
    tracked_mask_topic: "/piper/temporal_target_mask"
    debug_image_topic: "/piper/temporal_tracking_debug_image"
    status_topic: "/piper/temporal_tracking_status"
    heavy_refresh_request_topic: "/piper/heavy_refresh_request"

    min_tracking_confidence: 0.50
    low_tracking_confidence: 0.25
    max_missed_frames: 5
    # At 30 FPS this is approximately 60 seconds. Event-driven refreshes can occur sooner.
    refresh_interval_frames: 1800
    scene_change_threshold: 45.0
    min_mask_area_px: 100
    min_depth_valid_ratio: 0.40
    depth_margin_m: 0.03
    obstacle_persistence_frames: 3

    # Optical flow predicts motion; target-local HSV/depth snaps the mask to the green cube.
    enable_color_correction: true
    hsv_lower: [35, 80, 60]
    hsv_upper: [88, 255, 255]
    color_search_margin_px: 80
    color_min_area_px: 100
    color_max_centroid_shift_px: 100.0
    color_depth_tolerance_m: 0.15
    require_color_correction: true

    # Learn Lab chroma statistics from every accepted SAM2 seed and adapt slowly.
    enable_adaptive_appearance: true
    appearance_distance_threshold: 3.5
    appearance_min_chroma_sigma: 8.0
    appearance_max_chroma_sigma: 35.0
    appearance_update_rate: 0.05
    use_hsv_fallback: true

    dry_run: true
    enable_real_arm_motion: false
    debug: true
